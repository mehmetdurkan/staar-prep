<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study · Lone Star STAAR Prep</title>
    <link rel="stylesheet" href="../css/shared.css">
    <style>
        .vocab-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 12px 0;
        }
        .vocab-card {
            background: var(--blue-light);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 0.85rem;
        }
        .vocab-card .word { font-weight: 800; color: var(--blue); font-size: 0.9rem; }
        .vocab-card .def { color: var(--text-light); margin-top: 2px; }

        .array-viz {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin: 12px 0;
        }
        .array-row { display: flex; gap: 4px; }
        .array-dot {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .fraction-bar {
            display: flex;
            height: 32px;
            border: 2px solid var(--blue);
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }
        .fraction-part {
            flex: 1;
            border-right: 1px solid var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .fraction-part:last-child { border-right: none; }
        .fraction-part.shaded { background: var(--blue); color: white; }
        .fraction-part.unshaded { background: var(--blue-light); color: var(--blue); }

        .number-line-wrap {
            overflow-x: auto;
            padding: 8px 0;
        }
        .nl {
            display: flex;
            align-items: flex-end;
            gap: 0;
            min-width: 320px;
            padding: 0 12px;
        }
        .nl-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .nl-mark {
            width: 2px;
            height: 12px;
            background: var(--blue);
        }
        .nl-mark.tall {
            height: 20px;
        }
        .nl-bar {
            height: 3px;
            flex: 1;
            background: var(--blue);
            align-self: flex-end;
            margin-bottom: 5px;
        }
        .nl-num {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--blue);
            margin-top: 3px;
        }
        .nl-dot-marker {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--red);
            margin-bottom: 4px;
        }

        .steps-list { counter-reset: steps; margin: 10px 0; }
        .step-item {
            counter-increment: steps;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .step-item::before {
            content: counter(steps);
            background: var(--blue);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .rule-box {
            background: #FFF3CD;
            border: 2px solid #FFD000;
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font-size: 0.9rem;
            margin: 10px 0;
        }
        .rule-box strong { color: #5C4000; }
    </style>
</head>
<body>

<header class="site-header">
    <a class="logo" href="../index.html">
        <span class="logo-star">⭐</span>
        <span>Lone Star STAAR Prep</span>
    </a>
</header>

<div class="page-wrap">

    <a class="back-btn" href="../math/index.html" id="backBtn">← Topics</a>

    <div id="studyContent">
        <div class="loading-state" style="text-align:center; padding:40px; color:var(--text-light);">Loading study materials...</div>
    </div>

    <div style="text-align:center; margin-top:32px;" id="practiceBtn" style="display:none;"></div>

</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const topic = params.get('topic') || '';
    const subject = params.get('subject') || 'math';

    // Update back button for reading vs math
    const backBtn = document.getElementById('backBtn');
    if (subject === 'reading') {
        backBtn.href = '../reading/index.html';
        backBtn.textContent = '← Reading Topics';
    } else {
        backBtn.href = '../math/index.html';
        backBtn.textContent = '← Math Topics';
    }

    const content = {
        'multiplication':      renderMultiplication,
        'addition-subtraction': renderAddSub,
        'fractions':            renderFractions,
        'main-idea':            renderMainIdea,
        'literary-elements':    renderLiteraryElements,
        'vocabulary':           renderVocabulary,
        'authors-purpose':      renderAuthorsPurpose,
        'inferences':           renderInferences,
    };

    if (content[topic]) {
        document.getElementById('studyContent').innerHTML = content[topic]();
    } else {
        document.getElementById('studyContent').innerHTML = `
            <div style="text-align:center; padding:40px;">
                <div style="font-size:3rem;">📚</div>
                <p style="font-weight:700; font-size:1.1rem; margin-top:12px;">Study content coming soon for this topic!</p>
                <p class="text-muted mt-8">You can still practice this topic with questions.</p>
            </div>
        `;
    }

    document.getElementById('practiceBtn').innerHTML = `<a class="btn btn-primary btn-lg" href="../test/configure.html?subject=${subject}&topics=${topic}">⭐ Practice This Topic</a>`;
    document.getElementById('practiceBtn').style.display = 'block';

    function renderMultiplication() {
        return `
            <h1 style="font-size:1.5rem; font-weight:900; color:var(--blue); margin-bottom:4px;">✖️ Multiplication</h1>
            <p class="text-muted mb-16">TEKS 3.4D–G · Making equal groups, arrays, and word problems</p>

            <div class="study-card">
                <h3>📌 What is Multiplication?</h3>
                <p style="font-size:0.9rem;">Multiplication is a fast way to add equal groups. Instead of adding the same number over and over, we multiply!</p>
                <div class="example-box">
                    <strong>3 groups of 4 = 3 × 4 = 12</strong><br>
                    (Instead of 4 + 4 + 4 = 12)
                </div>
            </div>

            <div class="study-card">
                <h3>🔢 Reading a Multiplication Problem</h3>
                <div class="vocab-grid">
                    <div class="vocab-card"><div class="word">Factor</div><div class="def">Numbers being multiplied (e.g., 3 and 4)</div></div>
                    <div class="vocab-card"><div class="word">Product</div><div class="def">The answer (e.g., 3 × 4 = <strong>12</strong>)</div></div>
                    <div class="vocab-card"><div class="word">Array</div><div class="def">Rows and columns of objects</div></div>
                    <div class="vocab-card"><div class="word">Equal Groups</div><div class="def">Same number in each group</div></div>
                </div>
            </div>

            <div class="study-card">
                <h3>⬛ Arrays: Rows × Columns</h3>
                <p style="font-size:0.88rem; margin-bottom:8px;">An array shows multiplication as rows and columns. Count rows × columns to find the total.</p>
                <p style="font-size:0.85rem; font-weight:700; color:var(--blue); margin-bottom:6px;">3 rows × 4 columns = 12</p>
                <div class="array-viz">
                    <div class="array-row"><div class="array-dot"></div><div class="array-dot"></div><div class="array-dot"></div><div class="array-dot"></div></div>
                    <div class="array-row"><div class="array-dot"></div><div class="array-dot"></div><div class="array-dot"></div><div class="array-dot"></div></div>
                    <div class="array-row"><div class="array-dot"></div><div class="array-dot"></div><div class="array-dot"></div><div class="array-dot"></div></div>
                </div>
                <div class="tip-box">💡 <strong>Order doesn't matter!</strong> 3 × 4 = 4 × 3 = 12. This is called the <strong>Commutative Property</strong>.</div>
            </div>

            <div class="study-card">
                <h3>🧱 Area Model: Breaking Apart Big Numbers</h3>
                <p style="font-size:0.88rem; margin-bottom:8px;">For 2-digit × 1-digit problems, break the bigger number apart:</p>
                <div class="example-box">
                    <strong>6 × 14 = ?</strong><br>
                    Step 1: Break 14 into 10 + 4<br>
                    Step 2: 6 × 10 = 60<br>
                    Step 3: 6 × 4 = 24<br>
                    Step 4: 60 + 24 = <strong>84</strong>
                </div>
                <div class="tip-box">⭐ <strong>Try this:</strong> 3 × 23 = 3×20 + 3×3 = 60 + 9 = <strong>69</strong></div>
            </div>

            <div class="study-card">
                <h3>🔑 Key Facts to Memorize (×0 through ×10)</h3>
                <div class="rule-box">
                    <strong>Special rules:</strong><br>
                    • Any number × <strong>0</strong> = 0<br>
                    • Any number × <strong>1</strong> = that number<br>
                    • Any number × <strong>10</strong> = add a zero (e.g., 7 × 10 = 70)
                </div>
                <p style="font-size:0.85rem; margin-top:10px;">Skip counting tricks:</p>
                <div class="example-box" style="font-size:0.85rem; line-height:1.8;">
                    <strong>×5:</strong> 5, 10, 15, 20, 25, 30, 35, 40, 45, 50<br>
                    <strong>×9:</strong> Think ×10 then subtract: 9×7 = 70−7 = 63<br>
                    <strong>×6×7×8:</strong> "5, 6, 7, 8 → 56 = 7×8" (a trick!)
                </div>
            </div>
        `;
    }

    function renderAddSub() {
        return `
            <h1 style="font-size:1.5rem; font-weight:900; color:var(--blue); margin-bottom:4px;">➕ Addition & Subtraction</h1>
            <p class="text-muted mb-16">TEKS 3.4A–B · Within 1,000 · Rounding · Estimating</p>

            <div class="study-card">
                <h3>📌 Adding with Regrouping</h3>
                <p style="font-size:0.88rem; margin-bottom:10px;">When digits in a column add up to 10 or more, regroup (carry) to the next column.</p>
                <div class="example-box">
                    <strong>Example: 468 + 375</strong><br>
                    Ones: 8 + 5 = 13 → write 3, carry 1<br>
                    Tens: 6 + 7 + 1 = 14 → write 4, carry 1<br>
                    Hundreds: 4 + 3 + 1 = 8<br>
                    Answer: <strong>843</strong>
                </div>
            </div>

            <div class="study-card">
                <h3>➖ Subtracting with Regrouping</h3>
                <p style="font-size:0.88rem; margin-bottom:10px;">When the top digit is smaller than the bottom digit, borrow from the next column.</p>
                <div class="example-box">
                    <strong>Example: 503 − 247</strong><br>
                    Can't do 3 − 7. Borrow from tens (but tens is 0, borrow from hundreds).<br>
                    After borrowing: 13 − 7 = 6 (ones), 9 − 4 = 5 (tens), 4 − 2 = 2 (hundreds)<br>
                    Answer: <strong>256</strong>
                </div>
                <div class="tip-box">💡 <strong>Check your work:</strong> Add your answer back to the number you subtracted. You should get the starting number!</div>
            </div>

            <div class="study-card">
                <h3>🔄 Rounding Rules</h3>
                <div class="steps-list">
                    <div class="step-item">Find the place you are rounding to (tens, hundreds, thousands).</div>
                    <div class="step-item">Look at the digit ONE place to the RIGHT.</div>
                    <div class="step-item">If that digit is <strong>0, 1, 2, 3, or 4</strong> → round <strong>DOWN</strong> (keep the rounding digit the same).</div>
                    <div class="step-item">If that digit is <strong>5, 6, 7, 8, or 9</strong> → round <strong>UP</strong> (add 1 to the rounding digit).</div>
                </div>
                <div class="example-box">
                    <strong>Round 347 to the nearest 10:</strong> Look at ones → 7 ≥ 5 → round UP → <strong>350</strong><br>
                    <strong>Round 347 to the nearest 100:</strong> Look at tens → 4 < 5 → round DOWN → <strong>300</strong>
                </div>
            </div>

            <div class="study-card">
                <h3>💡 Estimating with Compatible Numbers</h3>
                <p style="font-size:0.88rem; margin-bottom:8px;">Compatible numbers are numbers that are easy to compute mentally — usually round numbers.</p>
                <div class="example-box">
                    <strong>Estimate 398 + 214:</strong><br>
                    398 ≈ 400, and 214 ≈ 200<br>
                    400 + 200 = <strong>600</strong> ← estimate
                </div>
                <div class="rule-box">
                    <strong>Keyword strategy for word problems:</strong><br>
                    • "in all / total / combined" → <strong>add</strong><br>
                    • "left / remaining / difference / more than" → <strong>subtract</strong>
                </div>
            </div>
        `;
    }

    function renderFractions() {
        return `
            <h1 style="font-size:1.5rem; font-weight:900; color:var(--blue); margin-bottom:4px;">🍕 Fractions</h1>
            <p class="text-muted mb-16">TEKS 3.3A–H · Equal parts, number lines, comparing, equivalent fractions</p>

            <div class="study-card">
                <h3>📌 Parts of a Fraction</h3>
                <div class="vocab-grid">
                    <div class="vocab-card"><div class="word">Numerator</div><div class="def">Top number — parts you have</div></div>
                    <div class="vocab-card"><div class="word">Denominator</div><div class="def">Bottom number — total equal parts</div></div>
                    <div class="vocab-card"><div class="word">Unit Fraction</div><div class="def">1/b — just ONE equal part (1/2, 1/3, 1/4...)</div></div>
                    <div class="vocab-card"><div class="word">Whole</div><div class="def">When numerator = denominator (4/4 = 1)</div></div>
                </div>
                <div class="example-box">
                    <strong>3/4 means:</strong> 3 parts shaded out of 4 equal parts total.
                </div>
            </div>

            <div class="study-card">
                <h3>📊 Fraction Bar Visual</h3>
                <p style="font-size:0.85rem; margin-bottom:6px;">This bar shows <strong>3/4</strong> shaded (3 out of 4 equal parts):</p>
                <div class="fraction-bar">
                    <div class="fraction-part shaded">1/4</div>
                    <div class="fraction-part shaded">1/4</div>
                    <div class="fraction-part shaded">1/4</div>
                    <div class="fraction-part unshaded">1/4</div>
                </div>
                <p style="font-size:0.85rem; margin-top:8px;">This bar shows <strong>2/6</strong> shaded:</p>
                <div class="fraction-bar">
                    <div class="fraction-part shaded">1/6</div>
                    <div class="fraction-part shaded">1/6</div>
                    <div class="fraction-part unshaded">1/6</div>
                    <div class="fraction-part unshaded">1/6</div>
                    <div class="fraction-part unshaded">1/6</div>
                    <div class="fraction-part unshaded">1/6</div>
                </div>
            </div>

            <div class="study-card">
                <h3>📏 Fractions on a Number Line</h3>
                <p style="font-size:0.85rem; margin-bottom:8px;">Fractions live between 0 and 1 (and beyond). The denominator tells you how many equal parts to divide the line into.</p>
                <p style="font-size:0.8rem; font-weight:700; color:var(--blue);">Fourths: 0, 1/4, 2/4, 3/4, 1</p>
                <div class="number-line-wrap">
                    <div style="display:flex; align-items:center; gap:0; padding:8px 0;">
                        <span style="font-size:0.75rem; font-weight:700; color:var(--blue); margin-right:4px;">0</span>
                        <div style="flex:1; height:3px; background:var(--blue); position:relative;">
                            <span style="position:absolute; left:0%; top:-16px; font-size:0.7rem; font-weight:700; color:var(--blue);">|</span>
                            <span style="position:absolute; left:25%; top:-16px; font-size:0.7rem; font-weight:700; color:var(--blue);">|</span>
                            <span style="position:absolute; left:25%; bottom:-18px; font-size:0.7rem; color:var(--blue);">1/4</span>
                            <span style="position:absolute; left:50%; top:-16px; font-size:0.7rem; font-weight:700; color:var(--red);">|</span>
                            <span style="position:absolute; left:50%; bottom:-18px; font-size:0.7rem; color:var(--red); font-weight:700;">2/4=1/2</span>
                            <span style="position:absolute; left:75%; top:-16px; font-size:0.7rem; font-weight:700; color:var(--blue);">|</span>
                            <span style="position:absolute; left:75%; bottom:-18px; font-size:0.7rem; color:var(--blue);">3/4</span>
                            <span style="position:absolute; right:0%; top:-16px; font-size:0.7rem; font-weight:700; color:var(--blue);">|</span>
                        </div>
                        <span style="font-size:0.75rem; font-weight:700; color:var(--blue); margin-left:4px;">1</span>
                    </div>
                </div>
            </div>

            <div class="study-card">
                <h3>⚖️ Comparing Fractions</h3>
                <div class="rule-box">
                    <strong>Same denominator:</strong> Bigger numerator = bigger fraction<br>
                    3/4 > 2/4 (because 3 parts > 2 parts)
                </div>
                <div class="rule-box">
                    <strong>Same numerator:</strong> Smaller denominator = bigger fraction<br>
                    1/3 > 1/6 (each 1/3 piece is larger than each 1/6 piece)
                </div>
                <div class="tip-box">💡 <strong>Think pizza slices!</strong> If you cut a pizza into 3 slices, each slice is bigger than if you cut it into 6 slices. So 1/3 > 1/6.</div>
            </div>

            <div class="study-card">
                <h3>🟰 Equivalent Fractions</h3>
                <p style="font-size:0.88rem; margin-bottom:8px;">Equivalent fractions look different but represent the same amount.</p>
                <div class="example-box">
                    <strong>1/2 = 2/4 = 3/6 = 4/8</strong> — all equal exactly half!
                </div>
                <div class="rule-box">
                    <strong>To check:</strong> Do they land on the same point on the number line? If yes, they're equivalent!
                </div>
            </div>
        `;
    }

    // ── READING STUDY GUIDES ──────────────────────────────────────────────────

    function renderMainIdea() {
        return `
            <h1 style="font-size:1.5rem; font-weight:900; color:var(--blue); margin-bottom:4px;">🎯 Main Idea & Details</h1>
            <p class="text-muted mb-16">TEKS 3.13A–D · Finding the central message and supporting details</p>

            <div class="study-card">
                <h3>📌 What is the Main Idea?</h3>
                <p style="font-size:0.9rem;">The <strong>main idea</strong> is what a passage is MOSTLY about. It is the big, important point the author wants you to understand. Supporting details are smaller facts or examples that explain or prove the main idea.</p>
                <div class="rule-box">
                    <strong>Ask yourself:</strong> "What is this passage MOSTLY about?" — Your answer is the main idea. Details answer "who, what, when, where, or how."
                </div>
            </div>

            <div class="study-card">
                <h3>📖 Key Vocabulary</h3>
                <div class="vocab-grid">
                    <div class="vocab-card"><div class="word">Main Idea</div><div class="def">The most important point of a passage</div></div>
                    <div class="vocab-card"><div class="word">Supporting Detail</div><div class="def">A fact that explains the main idea</div></div>
                    <div class="vocab-card"><div class="word">Summary</div><div class="def">A short retelling of the main points</div></div>
                    <div class="vocab-card"><div class="word">Topic</div><div class="def">The subject a passage is about (just one word or phrase)</div></div>
                </div>
            </div>

            <div class="study-card">
                <h3>🔎 Main Idea vs. Detail — Example</h3>
                <div style="background:#F5F5F0; border-left:4px solid var(--blue); padding:12px 14px; border-radius:0 8px 8px 0; font-size:0.9rem; line-height:1.6; margin-bottom:14px;">
                    <strong>Dogs as Helpers</strong><br>
                    Dogs do many important jobs for people. Some dogs guide people who cannot see. Others help police officers. Some dogs are trained to help children feel calm in hospitals. No matter the job, all working dogs are trained for many months.
                </div>
                <div class="steps-list">
                    <div class="step-item">The <strong>topic</strong> is "working dogs" — just the subject.</div>
                    <div class="step-item">The <strong>main idea</strong> is: <em>"Dogs do many important jobs for people."</em> — the big point.</div>
                    <div class="step-item">Supporting details: guide dogs, police dogs, hospital dogs — these prove the main idea.</div>
                </div>
            </div>

            <div class="study-card">
                <h3>⚠️ Common Traps</h3>
                <div class="steps-list">
                    <div class="step-item"><strong>Topic ≠ Main Idea.</strong> "Dogs" is the topic. "Dogs do many important jobs" is the main idea.</div>
                    <div class="step-item"><strong>Beware of details.</strong> If an answer is too specific (one example), it is a detail, not the main idea.</div>
                    <div class="step-item"><strong>Wrong answers often:</strong> Add information not in the passage, or focus on one small part.</div>
                </div>
                <div class="rule-box">
                    <strong>Quick Test:</strong> Can you answer "yes" to "Does this cover the WHOLE passage?"— not just one part? If yes, it is the main idea!
                </div>
            </div>

            <div class="study-card">
                <h3>📝 How to Write a Summary</h3>
                <div class="steps-list">
                    <div class="step-item">State the <strong>main idea</strong> in your own words.</div>
                    <div class="step-item">Add 2–3 <strong>important details</strong>.</div>
                    <div class="step-item">Keep it <strong>short</strong> — leave out small examples.</div>
                    <div class="step-item">Use your own words — do not copy the passage.</div>
                </div>
            </div>
        `;
    }

    function renderLiteraryElements() {
        return `
            <h1 style="font-size:1.5rem; font-weight:900; color:var(--blue); margin-bottom:4px;">📚 Literary Elements</h1>
            <p class="text-muted mb-16">TEKS 3.8A, 3.9A–B · Characters, setting, plot, problem, solution, and theme</p>

            <div class="study-card">
                <h3>📌 Story Structure</h3>
                <p style="font-size:0.9rem;">Every story has key parts. Knowing these parts helps you understand and answer questions about what you read.</p>
                <div class="vocab-grid">
                    <div class="vocab-card"><div class="word">Character</div><div class="def">Who the story is about</div></div>
                    <div class="vocab-card"><div class="word">Setting</div><div class="def">Where and when the story takes place</div></div>
                    <div class="vocab-card"><div class="word">Problem</div><div class="def">The challenge or conflict in the story</div></div>
                    <div class="vocab-card"><div class="word">Solution</div><div class="def">How the problem is solved</div></div>
                    <div class="vocab-card"><div class="word">Plot</div><div class="def">The sequence of events (beginning, middle, end)</div></div>
                    <div class="vocab-card"><div class="word">Theme</div><div class="def">The lesson or message of the story</div></div>
                </div>
            </div>

            <div class="study-card">
                <h3>👤 Character Traits</h3>
                <p style="font-size:0.9rem;">A character's traits are shown through their <strong>words, actions, thoughts,</strong> and <strong>feelings</strong>. Look for clues — the author often shows traits without stating them.</p>
                <div style="background:#F5F5F0; border-left:4px solid var(--blue); padding:12px 14px; border-radius:0 8px 8px 0; font-size:0.9rem; line-height:1.6; margin-bottom:8px;">
                    <em>"Maya wrapped the shivering kitten in her jacket without hesitating."</em>
                </div>
                <div class="rule-box">
                    The author does not say Maya is kind — but her <strong>action</strong> shows it. This is called a character trait shown through actions.
                </div>
            </div>

            <div class="study-card">
                <h3>🌍 Setting</h3>
                <p style="font-size:0.9rem;">Setting includes both <strong>where</strong> (place) and <strong>when</strong> (time of day, season, year). Setting affects mood and plot. Ask: How does where/when this takes place matter to the story?</p>
                <div class="steps-list">
                    <div class="step-item">Look for location words: <em>kitchen, forest, city, school yard</em></div>
                    <div class="step-item">Look for time words: <em>one morning, in winter, on the last day of school</em></div>
                    <div class="step-item">Think: Would the story change in a different place or time?</div>
                </div>
            </div>

            <div class="study-card">
                <h3>💡 Theme vs. Topic</h3>
                <p style="font-size:0.9rem;"><strong>Topic</strong> = what the story is about (one word). <strong>Theme</strong> = the lesson the story teaches (a full sentence).</p>
                <div style="background:#F5F5F0; padding:12px; border-radius:8px; font-size:0.9rem; margin:8px 0;">
                    <strong>Topic:</strong> friendship<br>
                    <strong>Theme:</strong> True friends help each other even when it costs them something.
                </div>
                <div class="rule-box">
                    <strong>Theme Tip:</strong> Ask "What does the main character LEARN?" or "What lesson could anyone take from this story?" — that is the theme.
                </div>
            </div>

            <div class="study-card">
                <h3>⚠️ Common Traps</h3>
                <div class="steps-list">
                    <div class="step-item">The theme is NEVER just a word. "Friendship" is a topic. "Good friends support each other" is a theme.</div>
                    <div class="step-item">The setting includes BOTH time and place — do not forget "when."</div>
                    <div class="step-item">Characters can CHANGE — look at how they are different at the end vs. the beginning.</div>
                </div>
            </div>
        `;
    }

    function renderVocabulary() {
        return `
            <h1 style="font-size:1.5rem; font-weight:900; color:var(--blue); margin-bottom:4px;">📝 Vocabulary in Context</h1>
            <p class="text-muted mb-16">TEKS 3.4A–D · Using clues in the passage to understand word meanings</p>

            <div class="study-card">
                <h3>📌 What are Context Clues?</h3>
                <p style="font-size:0.9rem;">Context clues are hints <em>inside the sentence or nearby sentences</em> that help you figure out the meaning of an unfamiliar word. You do not need a dictionary — the clues are already in the text!</p>
                <div class="rule-box">
                    <strong>Strategy:</strong> When you see an unknown word, re-read the sentence. Look for definitions, examples, or descriptions nearby.
                </div>
            </div>

            <div class="study-card">
                <h3>🔍 Types of Context Clues</h3>
                <div class="steps-list">
                    <div class="step-item"><strong>Definition:</strong> The text defines the word directly. <em>"The canopy, the top layer of the tall trees, was full of birds."</em></div>
                    <div class="step-item"><strong>Example:</strong> Examples around the word help explain it. <em>"Predators — like wolves, hawks, and sharks — hunt other animals."</em></div>
                    <div class="step-item"><strong>Synonym:</strong> A similar word is nearby. <em>"She was furious, angry beyond words."</em></div>
                    <div class="step-item"><strong>Antonym:</strong> An opposite clue. <em>"Unlike his timid brother, Jake was bold."</em> (timid = opposite of bold)</div>
                    <div class="step-item"><strong>General sense:</strong> The rest of the sentence helps you understand. <em>"She trudged home, her feet heavy and sore."</em> (trudge = walk with great effort)</div>
                </div>
            </div>

            <div class="study-card">
                <h3>📖 Multiple Meaning Words</h3>
                <p style="font-size:0.9rem;">Some words have more than one meaning. Always check how the word is used in the sentence to choose the right meaning.</p>
                <div style="background:#F5F5F0; padding:12px; border-radius:8px; font-size:0.9rem; margin:8px 0;">
                    <strong>"The smell of bread drew customers inside."</strong><br>
                    <em>drew</em> here means <strong>attracted/pulled</strong> — not <em>made a picture</em>.
                </div>
                <div class="rule-box">
                    <strong>Test the meaning:</strong> Replace the unknown word with your guess. Does the sentence still make sense?
                </div>
            </div>

            <div class="study-card">
                <h3>🔤 Word Parts</h3>
                <div class="vocab-grid">
                    <div class="vocab-card"><div class="word">un- / dis-</div><div class="def">not (unhappy, disagree)</div></div>
                    <div class="vocab-card"><div class="word">re-</div><div class="def">again (reread, return)</div></div>
                    <div class="vocab-card"><div class="word">-ful</div><div class="def">full of (careful, helpful)</div></div>
                    <div class="vocab-card"><div class="word">-less</div><div class="def">without (careless, hopeless)</div></div>
                    <div class="vocab-card"><div class="word">-er / -or</div><div class="def">person who (teacher, actor)</div></div>
                    <div class="vocab-card"><div class="word">pre-</div><div class="def">before (preview, precook)</div></div>
                </div>
            </div>

            <div class="study-card">
                <h3>⚠️ Common Traps</h3>
                <div class="steps-list">
                    <div class="step-item">Do not pick a meaning you already know if context changes the word's use.</div>
                    <div class="step-item">Watch for words that look familiar but are used differently (e.g., <em>anchor</em> as a verb — "roots anchor the soil").</div>
                    <div class="step-item">Always go back to the text — do not answer from memory alone.</div>
                </div>
            </div>
        `;
    }

    function renderAuthorsPurpose() {
        return `
            <h1 style="font-size:1.5rem; font-weight:900; color:var(--blue); margin-bottom:4px;">🖊️ Author's Purpose</h1>
            <p class="text-muted mb-16">TEKS 3.11A–C · Why did the author write this?</p>

            <div class="study-card">
                <h3>📌 The PIE Strategy</h3>
                <p style="font-size:0.9rem;">Every author writes for a reason. Use <strong>PIE</strong> to remember the three main purposes:</p>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin:12px 0;">
                    <div style="background:var(--blue-light); border-radius:8px; padding:12px; text-align:center;">
                        <div style="font-size:1.5rem;">📰</div>
                        <div style="font-weight:800; color:var(--blue);">P — Persuade</div>
                        <div style="font-size:0.78rem; color:var(--text-light); margin-top:4px;">Convince you to agree or take action</div>
                    </div>
                    <div style="background:var(--green-light); border-radius:8px; padding:12px; text-align:center;">
                        <div style="font-size:1.5rem;">💡</div>
                        <div style="font-weight:800; color:var(--green);">I — Inform</div>
                        <div style="font-size:0.78rem; color:var(--text-light); margin-top:4px;">Teach facts and information</div>
                    </div>
                    <div style="background:#FEF9E7; border-radius:8px; padding:12px; text-align:center;">
                        <div style="font-size:1.5rem;">🎭</div>
                        <div style="font-weight:800; color:#7D5A00;">E — Entertain</div>
                        <div style="font-size:0.78rem; color:var(--text-light); margin-top:4px;">Delight, amuse, or tell a story</div>
                    </div>
                </div>
                <div class="rule-box">
                    <strong>Tip:</strong> A passage can have more than one purpose (e.g., inform AND persuade), but there is always a PRIMARY purpose.
                </div>
            </div>

            <div class="study-card">
                <h3>🔍 How to Identify the Purpose</h3>
                <div class="steps-list">
                    <div class="step-item"><strong>Persuade?</strong> Look for opinions, arguments, evidence, and calls to action. Words like <em>"should," "must," "it is time to,"</em> and statistics are clues.</div>
                    <div class="step-item"><strong>Inform?</strong> Look for facts, dates, definitions, and explanations. Neutral tone, no opinions.</div>
                    <div class="step-item"><strong>Entertain?</strong> Look for stories, imaginative events, characters, emotions, and humor.</div>
                </div>
            </div>

            <div class="study-card">
                <h3>📖 Clue Words by Purpose</h3>
                <div class="vocab-grid">
                    <div class="vocab-card"><div class="word">Persuade</div><div class="def">should, must, everyone agrees, research shows, you can help, it is time to</div></div>
                    <div class="vocab-card"><div class="word">Inform</div><div class="def">was invented, is located, scientists found, according to, first, then, finally</div></div>
                    <div class="vocab-card"><div class="word">Entertain</div><div class="def">once upon a time, suddenly, he/she said, felt, laughed, imagined, the next day</div></div>
                    <div class="vocab-card"><div class="word">Both P+I</div><div class="def">Factual evidence used to argue a point — "Studies show... therefore we should"</div></div>
                </div>
            </div>

            <div class="study-card">
                <h3>⚠️ Common Traps</h3>
                <div class="steps-list">
                    <div class="step-item">A text with facts can still be <strong>persuasive</strong> — facts used as arguments are for persuading, not just informing.</div>
                    <div class="step-item">A story with a lesson is still written to <strong>entertain</strong>, not to persuade (unless it directly tells you to do something).</div>
                    <div class="step-item">If the passage has a clear <strong>call to action</strong> ("recycle today!"), it is persuasive.</div>
                </div>
            </div>

            <div class="study-card">
                <h3>✍️ Author's Tone</h3>
                <p style="font-size:0.9rem;"><strong>Tone</strong> is the author's attitude. It shows through word choices.</p>
                <div class="steps-list">
                    <div class="step-item"><strong>Neutral / informational:</strong> just the facts, no strong feelings</div>
                    <div class="step-item"><strong>Urgent / concerned:</strong> "before it is too late," "we must act now"</div>
                    <div class="step-item"><strong>Playful / humorous:</strong> funny details, exaggeration, light tone</div>
                    <div class="step-item"><strong>Serious:</strong> formal language, weighty topic</div>
                </div>
            </div>
        `;
    }

    function renderInferences() {
        return `
            <h1 style="font-size:1.5rem; font-weight:900; color:var(--blue); margin-bottom:4px;">🔍 Making Inferences</h1>
            <p class="text-muted mb-16">TEKS 3.13C · Using text clues + what you know to figure things out</p>

            <div class="study-card">
                <h3>📌 What is an Inference?</h3>
                <p style="font-size:0.9rem;">An <strong>inference</strong> is a smart guess based on clues in the text AND what you already know. Authors do not always tell you everything — you have to figure some things out yourself!</p>
                <div class="rule-box">
                    <strong>Formula:</strong> Text Clue + What I Know = Inference
                </div>
            </div>

            <div class="study-card">
                <h3>🔎 How to Make an Inference</h3>
                <div class="steps-list">
                    <div class="step-item">Read the passage carefully and look for <strong>clues</strong> (actions, words, descriptions).</div>
                    <div class="step-item">Ask: <em>"What does this clue tell me?"</em></div>
                    <div class="step-item">Think about what you already know about the topic or situation.</div>
                    <div class="step-item">Combine the clue + your knowledge to make your inference.</div>
                    <div class="step-item">Check: <em>"Does my inference make sense with ALL the clues in the text?"</em></div>
                </div>
            </div>

            <div class="study-card">
                <h3>📖 Example Inference</h3>
                <div style="background:#F5F5F0; border-left:4px solid var(--blue); padding:12px 14px; border-radius:0 8px 8px 0; font-size:0.9rem; line-height:1.6; margin-bottom:14px;">
                    Lily woke up and looked out her window. The sky was gray and drops tapped against the glass. She pulled out her raincoat and grabbed her backpack.
                </div>
                <div class="steps-list">
                    <div class="step-item"><strong>Clue:</strong> gray sky, drops on glass, raincoat</div>
                    <div class="step-item"><strong>What I know:</strong> gray skies + water drops = rain; backpack in morning = school</div>
                    <div class="step-item"><strong>Inference:</strong> It is raining and Lily is going to school.</div>
                </div>
                <div class="rule-box">
                    Notice: "rain" and "school" are never stated — but the clues clearly point to them!
                </div>
            </div>

            <div class="study-card">
                <h3>💬 Inferring Character Feelings</h3>
                <p style="font-size:0.9rem;">Authors show feelings through <strong>actions, facial expressions, body language,</strong> and <strong>dialogue</strong>. Look for these clues to infer how a character feels.</p>
                <div class="vocab-grid">
                    <div class="vocab-card"><div class="word">Sighed / slumped</div><div class="def">→ Disappointed, sad, or tired</div></div>
                    <div class="vocab-card"><div class="word">Clenched fists / gritted teeth</div><div class="def">→ Angry, frustrated</div></div>
                    <div class="vocab-card"><div class="word">Eyes lit up / smiled wide</div><div class="def">→ Excited, happy</div></div>
                    <div class="vocab-card"><div class="word">Looked away / spoke softly</div><div class="def">→ Nervous, shy, embarrassed</div></div>
                </div>
            </div>

            <div class="study-card">
                <h3>⚠️ Common Traps</h3>
                <div class="steps-list">
                    <div class="step-item"><strong>Too far a stretch:</strong> Your inference must be supported by text clues — not just imagination.</div>
                    <div class="step-item"><strong>Stating what the text says:</strong> A literal answer is not an inference. An inference goes beyond what is stated.</div>
                    <div class="step-item"><strong>Ignoring all clues:</strong> Use ALL the clues in the passage, not just one.</div>
                </div>
                <div class="rule-box">
                    <strong>Ask:</strong> "Can I point to text clues that support my answer?" If yes — it is a valid inference!
                </div>
            </div>
        `;
    }
</script>
